name: Build PerfGame Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject custom games and defaults
        run: |
          python3 <<'PY'
          from pathlib import Path

          repo = Path("module")
          gamelist = repo / "webroot" / "gamelist.txt"
          service = repo / "service.sh"

          games = [
              ("com.roblox.client", 90, 0.45),
              ("org.levimc.launcher", 90, 0.60),
          ]

          # Add games to gamelist.txt if missing
          current = gamelist.read_text(encoding="utf-8") if gamelist.exists() else ""
          lines = current.splitlines()
          for pkg, fps, scale in games:
              if pkg not in lines:
                  lines.append(pkg)
          gamelist.write_text("\n".join(lines).strip() + "\n", encoding="utf-8")

          # Seed configs on boot so they stay saved
          text = service.read_text(encoding="utf-8")
          marker = "sleep 10\nperfutils\n"
          seed_block = """sleep 10

# Custom game defaults added by GitHub Actions
device_config put game_overlay com.roblox.client mode=2,fps=90,downscaleFactor=0.45:mode=3,fps=90,downscaleFactor=0.45
device_config put game_overlay org.levimc.launcher mode=2,fps=90,downscaleFactor=0.60:mode=3,fps=90,downscaleFactor=0.60

perfutils
"""
          if "com.roblox.client mode=2,fps=90,downscaleFactor=0.45" not in text:
              text = text.replace(marker, seed_block, 1)
          service.write_text(text, encoding="utf-8")
          PY

      - name: Build WebUI
        working-directory: ./webui
        run: |
          npm install
          npm run build

      - name: Download Executable Daemon
        uses: dawidd6/action-download-artifact@v3
        with:
          name: perfutils
          path: module/libs/
          workflow: build.yml
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse module.prop
        id: module_prop
        run: |
          NAME=$(grep '^name=' module/module.prop | cut -d'=' -f2)
          VERSION=$(grep '^version=' module/module.prop | cut -d'=' -f2)
          MODULE_NAME="${NAME}${VERSION}"

          echo "MODULE_NAME=${MODULE_NAME}" >> $GITHUB_OUTPUT
          echo "Module name: ${MODULE_NAME}"

      - name: Prepare Module Structure
        run: |
          mkdir -p "${{ steps.module_prop.outputs.MODULE_NAME }}"
          cp -r module/* "${{ steps.module_prop.outputs.MODULE_NAME }}/"
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/webroot/"*.map
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/mode.conf"

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.module_prop.outputs.MODULE_NAME }}
          path: ${{ steps.module_prop.outputs.MODULE_NAME }}
