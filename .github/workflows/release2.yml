name: Build PerfGame Custom

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add custom games to gamelist
        run: |
          python3 << 'EOF'
          from pathlib import Path

          gamelist = Path("module/webroot/gamelist.txt")
          gamelist.parent.mkdir(parents=True, exist_ok=True)

          existing = []
          if gamelist.exists():
              existing = [x.strip() for x in gamelist.read_text(encoding="utf-8").splitlines() if x.strip()]

          custom_games = [
              "com.roblox.client",
              "org.levimc.launcher"
          ]

          for game in custom_games:
              if game not in existing:
                  existing.append(game)

          gamelist.write_text("\n".join(existing) + "\n", encoding="utf-8")
          print("Updated gamelist.txt")
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build WebUI
        run: |
          npm install
          npm run build

      - name: Package module
        run: |
          mkdir -p output
          cp -r module output/PerfGame
          cd output
          zip -r PerfGame-Custom.zip PerfGame

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerfGame-Custom
          path: output/PerfGame-Custom.zip
