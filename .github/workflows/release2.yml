name: Build PerfGame KernelSU Ready

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add custom games
        run: |
          python3 << 'EOF'
          from pathlib import Path

          gamelist = Path("module/webroot/gamelist.txt")
          gamelist.parent.mkdir(parents=True, exist_ok=True)

          games = [
              "com.roblox.client",
              "org.levimc.launcher"
          ]

          current = []
          if gamelist.exists():
              current = [
                  x.strip()
                  for x in gamelist.read_text(encoding="utf-8").splitlines()
                  if x.strip()
              ]

          for game in games:
              if game not in current:
                  current.append(game)

          gamelist.write_text("\n".join(current) + "\n", encoding="utf-8")
          print("Games added successfully")
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build WebUI
        run: |
          npm install
          npm run build

      - name: Ensure libs folder exists
        run: |
          mkdir -p module/libs

          if [ -d libs ]; then
            cp -r libs/* module/libs/
          fi

          if [ -f perfutils.zip ]; then
            unzip -o perfutils.zip -d module/libs/
          fi

      - name: Verify files
        run: |
          echo "Checking perfutils binaries..."
          find module/libs -type f -name perfutils || true

      - name: Package module
        run: |
          mkdir -p output/PerfGame
          cp -r module/* output/PerfGame/

          cd output
          zip -r PerfGame-Custom-KernelSU.zip PerfGame

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PerfGame-Custom-KernelSU
          path: output/PerfGame-Custom-KernelSU.zip
