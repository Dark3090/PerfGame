name: Add custom games to PerfGame

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gamelist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add games to gamelist
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("module/webroot/gamelist.txt")
          path.parent.mkdir(parents=True, exist_ok=True)

          current = []
          if path.exists():
              current = [
                  line.strip()
                  for line in path.read_text(encoding="utf-8").splitlines()
                  if line.strip()
              ]

          add = [
              "com.roblox.client",
              "org.levimc.launcher",
          ]

          for pkg in add:
              if pkg not in current:
                  current.append(pkg)

          path.write_text("\n".join(current) + "\n", encoding="utf-8")
          PY

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module/webroot/gamelist.txt
          git commit -m "Add custom games to gamelist"
          git push
