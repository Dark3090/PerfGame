name: Build PerfGame — Persistent Configs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # ── PATCH 1 — perfutils.c ─────────────────────────────────────────────
      # Adiciona read_game_config() e apply_game_config():
      # toda vez que o app e detectado em foco pelo daemon,
      # a resolucao e fps salvos sao reaplicados automaticamente.
      - name: Patch 1 — perfutils.c
        run: echo '' | base64 -d > jni/src/perfutils.c

      # ── PATCH 2 — service.sh ──────────────────────────────────────────────
      # No boot, le cada .conf salvo e reaplicar device_config.
      # Necessario porque device_config e volatil (some no reboot).
      - name: Patch 2 — service.sh
        run: echo '' | base64 -d > module/service.sh

      # ── PATCH 3 — perfutils.js ────────────────────────────────────────────
      # Bug raiz corrigido: executeCommand() so dispara callback se stdout
      # nao for vazio — device_config put nao retorna stdout, entao o
      # callback nunca disparava e o .conf nunca era gravado.
      # Corrigido usando exec() direto do kernelsu (sem callback).
      - name: Patch 3 — perfutils.js
        run: echo '' | base64 -d > webui/perfutils.js

      - name: Verificar patches
        run: |
          python3 - << 'EOF'
          import sys
          errors = []
          c  = open('jni/src/perfutils.c').read()
          sh = open('module/service.sh').read()
          js = open('webui/perfutils.js').read()
          apply_start = js.find('function applyConfiguration')
          apply_body  = js[apply_start:apply_start+1200]
          reset_start = js.find('function resetConfiguration')
          reset_body  = js[reset_start:reset_start+400]
          checks = [
              ('read_game_config'    in c,            'perfutils.c: read_game_config'),
              ('apply_game_config'   in c,            'perfutils.c: apply_game_config'),
              ('GAME_CONFIGS'        in c,            'perfutils.c: GAME_CONFIGS'),
              ('game_configs'        in sh,           'service.sh: game_configs'),
              ('device_config put'   in sh,           'service.sh: device_config put'),
              ('game_configs'        in apply_body,   'perfutils.js: salva game_configs'),
              ('exec(`mkdir'         in apply_body,   'perfutils.js: exec mkdir'),
              ('exec(`echo'          in apply_body,   'perfutils.js: exec echo .conf'),
              ('exec(configCommand)' in apply_body,   'perfutils.js: exec device_config'),
              ('rm -f'               in reset_body,   'perfutils.js: rm .conf no reset'),
          ]
          for ok, label in checks:
              print(('OK  ' if ok else 'FAIL'), label)
              if not ok: errors.append(label)
          if errors:
              print('\nFalhas:', errors)
              sys.exit(1)
          print('\n10/10 — Todos os patches verificados!')
          EOF

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build daemon (arm64 + arm32)
        run: |
          export NDK_PROJECT_PATH=$GITHUB_WORKSPACE
          export PATH=$PATH:$ANDROID_NDK_ROOT
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk \
            V=1

      - name: Build WebUI
        working-directory: ./webui
        run: |
          npm install
          npm run build

      - name: Parse module.prop
        id: module_prop
        run: |
          NAME=$(grep '^name=' module/module.prop | cut -d'=' -f2)
          VERSION=$(grep '^version=' module/module.prop | cut -d'=' -f2)
          echo "MODULE_NAME=${NAME}${VERSION}" >> $GITHUB_OUTPUT

      - name: Copia daemon para o modulo
        run: |
          mkdir -p module/libs
          cp -r libs/* module/libs/

      - name: Prepara estrutura do modulo
        run: |
          mkdir -p ${{ steps.module_prop.outputs.MODULE_NAME }}
          cp -r module/* ${{ steps.module_prop.outputs.MODULE_NAME }}/
          rm -f ${{ steps.module_prop.outputs.MODULE_NAME }}/webroot/*.map
          rm -f ${{ steps.module_prop.outputs.MODULE_NAME }}/mode.conf

      - name: Upload modulo final
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.module_prop.outputs.MODULE_NAME }}
          path: ${{ steps.module_prop.outputs.MODULE_NAME }}
