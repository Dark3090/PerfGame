name: Build PerfGame Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read custom games and patch module
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path(".")
          module = root / "module"
          gamelist = module / "webroot" / "gamelist.txt"
          service = module / "service.sh"
          custom_file = root / "custom-games.txt"

          if not custom_file.exists():
              raise SystemExit("custom-games.txt not found")

          games = []
          for raw in custom_file.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              parts = [p.strip() for p in line.split("|")]
              if len(parts) != 3:
                  raise SystemExit(f"Invalid line in custom-games.txt: {raw}")
              pkg, fps, scale = parts
              try:
                  fps_int = int(fps)
                  scale_float = float(scale)
              except ValueError:
                  raise SystemExit(f"Invalid FPS or scale in line: {raw}")
              games.append((pkg, fps_int, scale_float))

          if not games:
              raise SystemExit("No valid games found in custom-games.txt")

          # Ensure gamelist exists
          gamelist.parent.mkdir(parents=True, exist_ok=True)
          if gamelist.exists():
              current = gamelist.read_text(encoding="utf-8").splitlines()
          else:
              current = []

          # Add package names to gamelist.txt
          for pkg, _, _ in games:
              if pkg not in current:
                  current.append(pkg)

          gamelist.write_text("\n".join(current).strip() + "\n", encoding="utf-8")

          # Create a boot script that re-applies configs every boot
          boot_script = module / "custom-games-boot.sh"
          lines = [
              "#!/system/bin/sh",
              "",
              "# Auto-generated by GitHub Actions",
          ]
          for pkg, fps, scale in games:
              lines.append(
                  f'device_config put game_overlay {pkg} mode=2,fps={fps},downscaleFactor={scale}:mode=3,fps={fps},downscaleFactor={scale}'
              )
          boot_script.write_text("\n".join(lines) + "\n", encoding="utf-8")

          # Make service.sh run the boot script before perfutils
          service_text = service.read_text(encoding="utf-8")
          marker = "sleep 10\nperfutils\n"
          inject = """sleep 10
[ -f "$MODPATH/custom-games-boot.sh" ] && sh "$MODPATH/custom-games-boot.sh"
perfutils
"""
          if marker in service_text:
              service_text = service_text.replace(marker, inject, 1)
          elif 'custom-games-boot.sh' not in service_text:
              service_text = service_text.replace("sleep 10\nperfutils", inject.strip(), 1)

          service.write_text(service_text, encoding="utf-8")
          PY

      - name: Build WebUI
        working-directory: ./webui
        run: |
          npm install
          npm run build

      - name: Download Executable Daemon
        uses: dawidd6/action-download-artifact@v3
        with:
          name: perfutils
          path: module/libs/
          workflow: build.yml
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse module.prop
        id: module_prop
        run: |
          NAME=$(grep '^name=' module/module.prop | cut -d'=' -f2)
          VERSION=$(grep '^version=' module/module.prop | cut -d'=' -f2)
          MODULE_NAME="${NAME}${VERSION}"

          echo "MODULE_NAME=${MODULE_NAME}" >> $GITHUB_OUTPUT

      - name: Prepare Module Structure
        run: |
          mkdir -p "${{ steps.module_prop.outputs.MODULE_NAME }}"
          cp -r module/* "${{ steps.module_prop.outputs.MODULE_NAME }}/"
          chmod 755 "${{ steps.module_prop.outputs.MODULE_NAME }}/custom-games-boot.sh" || true
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/webroot/"*.map
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/mode.conf"

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.module_prop.outputs.MODULE_NAME }}
          path: ${{ steps.module_prop.outputs.MODULE_NAME }}
