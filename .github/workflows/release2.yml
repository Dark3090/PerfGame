name: Build PerfGame Custom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build WebUI
        run: |
          npm install
          npm run build

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build perfutils
        run: |
          ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk \
            V=1

      - name: Apply custom games
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path(".")
          module_dir = root / "module"
          gamelist = module_dir / "webroot" / "gamelist.txt"
          service = module_dir / "service.sh"
          custom_script = module_dir / "custom-games.sh"
          custom_file = root / "custom-games.txt"

          if not custom_file.exists():
              raise SystemExit("custom-games.txt not found in repo root")

          games = []
          for raw in custom_file.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              parts = [p.strip() for p in line.split("|")]
              if len(parts) != 3:
                  raise SystemExit(f"Invalid line in custom-games.txt: {raw}")
              pkg, fps, scale = parts
              games.append((pkg, int(fps), float(scale)))

          gamelist.parent.mkdir(parents=True, exist_ok=True)
          current = gamelist.read_text(encoding="utf-8").splitlines() if gamelist.exists() else []
          for pkg, _, _ in games:
              if pkg not in current:
                  current.append(pkg)
          gamelist.write_text("\n".join(current).strip() + "\n", encoding="utf-8")

          script_lines = ["#!/system/bin/sh", ""]
          for pkg, fps, scale in games:
              script_lines.append(
                  f'device_config put game_overlay {pkg} mode=2,fps={fps},downscaleFactor={scale}:mode=3,fps={fps},downscaleFactor={scale}'
              )
          custom_script.write_text("\n".join(script_lines) + "\n", encoding="utf-8")

          text = service.read_text(encoding="utf-8")
          inject = 'sleep 10\n[ -f "$MODPATH/custom-games.sh" ] && sh "$MODPATH/custom-games.sh"\nperfutils\n'
          marker = 'sleep 10\nperfutils\n'
          if marker in text:
              text = text.replace(marker, inject, 1)
          elif 'custom-games.sh' not in text:
              text = text.replace('sleep 10\nperfutils', inject.strip(), 1)
          service.write_text(text, encoding="utf-8")
          PY

      - name: Copy libs into module
        run: |
          mkdir -p module/libs
          cp -r libs/* module/libs/

      - name: Parse module.prop
        id: module_prop
        run: |
          NAME=$(grep '^name=' module/module.prop | cut -d'=' -f2)
          VERSION=$(grep '^version=' module/module.prop | cut -d'=' -f2)
          echo "MODULE_NAME=${NAME}${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare package
        run: |
          mkdir -p "${{ steps.module_prop.outputs.MODULE_NAME }}"
          cp -r module/* "${{ steps.module_prop.outputs.MODULE_NAME }}/"
          chmod 755 "${{ steps.module_prop.outputs.MODULE_NAME }}/custom-games.sh" || true
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/webroot/"*.map
          rm -f "${{ steps.module_prop.outputs.MODULE_NAME }}/mode.conf"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.module_prop.outputs.MODULE_NAME }}
          path: ${{ steps.module_prop.outputs.MODULE_NAME }}
